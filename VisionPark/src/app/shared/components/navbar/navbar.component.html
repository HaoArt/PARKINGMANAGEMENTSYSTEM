<!-- Thay thế ion-header bằng thẻ HTML thuần để loại bỏ hoàn toàn giới hạn Shadow DOM của Ionic -->
<header class="flex items-center justify-between bg-white w-full border-b border-gray-200 transition-all" style="padding: 20px 32px 16px 16px;">
    
    <div class="flex items-center">
      <ion-menu-button color="dark" auto-hide="false" class="bg-white rounded-xl shadow-sm border border-gray-100 mr-2 lg:hidden"></ion-menu-button>
      
      <div class="page-title hidden lg:flex flex-col justify-center ml-4">
        <h1 class="text-[26px] font-black text-[#111827] m-0 tracking-tight leading-none">{{ pageTitle }}</h1>
        <p *ngIf="isDashboard" class="text-[13px] font-semibold text-gray-500 m-0 mt-2">{{ currentDate }}</p>
      </div>

      <div class="page-title lg:hidden ml-2 flex flex-col justify-center">
        <h1 class="text-[20px] font-black text-[#111827] m-0 tracking-tight leading-none">{{ pageTitle }}</h1>
        <p *ngIf="isDashboard" class="text-[11px] font-semibold text-gray-500 m-0 mt-1.5">{{ currentDate }}</p>
      </div>
    </div>

    <div class="hidden lg:flex flex-1 justify-center px-12 relative w-full max-w-[600px] mx-auto">
      <ion-icon name="search-outline" class="absolute left-16 top-1/2 -translate-y-1/2 text-gray-400 text-[18px] z-10"></ion-icon>
      <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="onSearch()" placeholder="Tìm kiếm biển số xe..." class="w-full bg-white border border-gray-200 rounded-full py-2.5 pl-12 pr-4 text-[13px] font-semibold text-gray-700 outline-none focus:border-[#003399] focus:ring-4 focus:ring-[#003399]/10 transition-all shadow-sm">
    </div>

    <div class="flex items-center gap-4">
      
      <div class="hidden sm:flex items-center gap-3 mr-2">
        <button class="relative bg-white w-10 h-10 rounded-full flex items-center justify-center border border-gray-200 text-gray-500 hover:text-[#003399] hover:bg-blue-50 transition-colors shadow-sm cursor-pointer">
          <ion-icon name="notifications-outline" class="text-[20px]"></ion-icon>
          <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
        </button>
        <button class="bg-white w-10 h-10 rounded-full flex items-center justify-center border border-gray-200 text-gray-500 hover:text-[#003399] hover:bg-blue-50 transition-colors shadow-sm cursor-pointer">
          <ion-icon name="help-circle-outline" class="text-[22px]"></ion-icon>
        </button>
      </div>

      <!-- Khung chứa Dropdown Tùy chỉnh (Mượt hơn ion-popover) -->
      <div class="relative z-50">
        <!-- Màn che vô hình để tự đóng menu khi click ra ngoài -->
        <div *ngIf="isProfileMenuOpen" class="fixed inset-0 z-40" (click)="isProfileMenuOpen = false"></div>

        <!-- Nút Bấm -->
        <div class="relative z-50 flex items-center gap-3 cursor-pointer hover:bg-gray-100 p-2 rounded-2xl transition-colors" (click)="isProfileMenuOpen = !isProfileMenuOpen">
          <div class="hidden sm:flex flex-col text-right">
            <span class="text-[14px] font-bold text-[#111827]">{{ fullName }}</span>
            <span class="text-[11px] font-bold text-[#003399] uppercase tracking-wider">{{ role }}</span>
          </div>
          <div class="w-11 h-11 rounded-full border-2 border-white overflow-hidden shadow-md">
            <img [src]="avatarUrl" (error)="onAvatarError($event)" alt="Avatar" class="w-full h-full object-cover bg-white">
          </div>
          <ion-icon name="chevron-down-outline" class="text-gray-400 text-sm hidden sm:block transition-transform" [class.rotate-180]="isProfileMenuOpen"></ion-icon>
        </div>

        <!-- Menu Dropdown Xổ Xuống -->
        <div *ngIf="isProfileMenuOpen" class="absolute right-0 mt-2 w-56 bg-white rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.1)] border border-gray-100 overflow-hidden transform origin-top-right transition-all z-50">
          <div class="px-4 py-3 border-b border-gray-100 sm:hidden block">
            <p class="font-bold text-[#111827] m-0 text-sm">{{ fullName }}</p>
            <p class="font-bold text-[#003399] m-0 text-[11px] uppercase mt-1">{{ role }}</p>
          </div>
          <div class="py-2">
            <button (click)="isProfileMenuOpen = false; manageAccount()" class="w-full flex items-center px-5 py-3 text-[14px] font-bold text-gray-700 hover:bg-gray-50 transition-colors border-none bg-transparent cursor-pointer">
              <ion-icon name="person-outline" class="text-[18px] mr-3 text-gray-400"></ion-icon> Quản lý tài khoản
            </button>
            <button (click)="isProfileMenuOpen = false; logout()" class="w-full flex items-center px-5 py-3 text-[14px] font-bold text-red-600 hover:bg-red-50 transition-colors border-none bg-transparent cursor-pointer">
              <ion-icon name="log-out-outline" class="text-[18px] mr-3 text-red-500"></ion-icon> Đăng xuất
            </button>
          </div>
        </div>
      </div>

    </div>
</header>
