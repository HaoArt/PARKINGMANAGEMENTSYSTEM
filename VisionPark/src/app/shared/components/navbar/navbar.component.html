<ion-header class="ion-no-border hidden md:block border-b border-gray-200">
  <ion-toolbar style="--background: #ffffff; --padding-start: 16px; --padding-end: 16px;">
    
    <ion-buttons slot="start">
      <ion-menu-button color="dark"></ion-menu-button>
    </ion-buttons>

    <div class="flex flex-1 justify-center px-4 w-full">
      <div class="flex items-center bg-gray-100 rounded-full px-4 py-2.5 max-w-lg w-full shadow-inner">
        <ion-icon name="search-outline" class="text-gray-500 mr-2 text-lg"></ion-icon>
        <input type="text" placeholder="Tìm biển số xe..." class="bg-transparent border-none outline-none w-full text-sm text-gray-800 placeholder:text-gray-500 font-medium">
      </div>
    </div>

    <ion-buttons slot="end" class="flex items-center gap-3">
      <button class="relative bg-blue-50 text-blue-700 rounded-full w-10 h-10 flex items-center justify-center hover:bg-blue-100 transition-colors">
        <ion-icon name="notifications-outline" class="text-xl"></ion-icon>
        <div class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-600 rounded-full border-2 border-white"></div>
      </button>
      
      <div class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 px-3 py-1.5 rounded-xl transition border border-transparent hover:border-gray-100">
        <ion-avatar class="w-9 h-9">
          <img src="https://ionicframework.com/docs/img/demos/avatar.svg" alt="Avatar">
        </ion-avatar>
        <div class="hidden lg:flex flex-col">
          <span class="text-sm font-bold text-gray-800">Admin</span>
          <span class="text-[11px] text-gray-500 font-medium">Quản lý</span>
        </div>
      </div>
    </ion-buttons>

  </ion-toolbar>
</ion-header>
