<ion-menu contentId="main-content" class="border-none shadow-none">
  <ion-header class="ion-no-border">
    <ion-toolbar style="--background: #f8f9fa;">
      <h1 class="text-[20px] font-extrabold text-[#0a192f] m-0 pl-6 mt-4 tracking-tight">VisionPark</h1>
    </ion-toolbar>
  </ion-header>

  <ion-content style="--background: #f8f9fa;">
    <ion-list lines="none" class="px-3 pt-6 bg-transparent">
      
      <ion-item 
        *ngFor="let p of adminPages"
        button
        (click)="navigate(p.url)"
        [ngClass]="currentUrl === p.url ? 'active-menu' : 'inactive-menu'"
        detail="false" 
        class="menu-item cursor-pointer mb-2 transition-all">
        
        <ion-icon *ngIf="p.title !== 'QUẢN LÝ BÃI ĐỖ'" slot="start" [name]="p.icon" class="text-[18px] mr-3"></ion-icon>
        <span *ngIf="p.title === 'QUẢN LÝ BÃI ĐỖ'" slot="start" class="text-[18px] mr-3 font-bold flex items-center justify-center w-[18px]">P</span>

        <ion-label class="text-[11px] font-bold uppercase tracking-wider">{{ p.title }}</ion-label>
      </ion-item>

    </ion-list>
  </ion-content>
</ion-menu>
