<ion-menu contentId="main-content" class="border-r border-gray-200">
  <ion-header class="ion-no-border">
    <ion-toolbar class="px-4 py-3" style="--background: #ffffff;">
      <h1 class="text-2xl font-extrabold text-[#0040a1] m-0 tracking-tight">VisionPark</h1>
    </ion-toolbar>
  </ion-header>

  <ion-content style="--background: #ffffff;">
    <ion-list lines="none" class="px-3 mt-2 bg-transparent">
      
      <ion-item 
        *ngFor="let p of adminPages"
        button
        (click)="navigate(p.url)"
        [ngClass]="{'bg-blue-50 text-[#0040a1] font-bold selected': currentUrl === p.url}"
        detail="false" 
        class="menu-item cursor-pointer mb-2 rounded-xl transition-all" 
        style="--background: transparent; --color: #4b5563;">
        <ion-icon slot="start" [name]="p.icon" class="text-xl"></ion-icon>
        <ion-label class="text-[15px]">{{ p.title }}</ion-label>
      </ion-item>

      <div class="mt-8 border-t border-gray-100 pt-4">
        <ion-item 
          button 
          (click)="navigate('/login')"
          lines="none" 
          class="logout-item cursor-pointer rounded-xl hover:bg-red-50 text-red-600 transition-all" 
          style="--background: transparent; --color: #dc2626;">
          <ion-icon slot="start" name="log-out-outline" class="text-xl"></ion-icon>
          <ion-label class="font-semibold text-[15px]">Đăng xuất</ion-label>
        </ion-item>
      </div>

    </ion-list>
  </ion-content>
</ion-menu>
