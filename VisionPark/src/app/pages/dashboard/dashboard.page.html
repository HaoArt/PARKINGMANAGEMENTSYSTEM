<div class="mt-8 bg-white p-5 rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100">
      
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <h3 class="text-xl font-bold text-[#191c1d] m-0 tracking-tight">Lịch sử ra vào gần đây</h3>
        
        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
          <div class="relative w-full sm:w-56">
            <input 
              type="text" 
              placeholder="Tìm biển số, mã NFC..." 
              class="w-full bg-[#f4f6f8] text-[#191c1d] text-sm border-none rounded-xl pl-10 pr-3 py-2.5 outline-none focus:ring-2 focus:ring-[#0040a1]"
              [(ngModel)]="searchTerm" 
              (input)="applyFilters()">
            <ion-icon name="search-outline" class="absolute left-3 top-3 text-gray-400 text-lg"></ion-icon>
          </div>

          <select 
            class="bg-[#f4f6f8] text-[#191c1d] text-sm border-none rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-[#0040a1] font-medium"
            [(ngModel)]="filterStatus" 
            (change)="applyFilters()">
            <option value="all">Tất cả trạng thái</option>
            <option value="In">Đang trong bãi</option>
            <option value="Out">Đã rời đi</option>
          </select>
        </div>
      </div>

      <div class="overflow-x-auto rounded-xl border border-gray-100">
        <table class="w-full text-left border-collapse whitespace-nowrap">
          <thead>
            <tr class="bg-[#f8f9fa] text-gray-500 text-xs uppercase tracking-wider border-b border-gray-100">
              <th class="py-4 px-5 font-bold">Mã NFC</th>
              <th class="py-4 px-5 font-bold">Biển số</th>
              <th class="py-4 px-5 font-bold">Loại xe</th>
              <th class="py-4 px-5 font-bold">Thời gian</th>
              <th class="py-4 px-5 font-bold text-center">Trạng thái</th>
            </tr>
          </thead>
          <tbody class="text-sm">
            <tr *ngFor="let item of paginatedRecords" class="border-b border-gray-50 hover:bg-blue-50/50 transition-colors">
              <td class="py-3 px-5 font-semibold text-[#0040a1]">{{ item.id }}</td>
              <td class="py-3 px-5 font-medium text-gray-800">{{ item.plateNumber }}</td>
              <td class="py-3 px-5 text-gray-600">{{ item.vehicleType }}</td>
              <td class="py-3 px-5 text-gray-600">{{ item.timeIn }}</td>
              <td class="py-3 px-5 text-center">
                <span [class]="item.status === 'In' 
                  ? 'bg-[#e7edf6] text-[#0040a1] px-3 py-1 rounded-full text-xs font-bold' 
                  : 'bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold'">
                  {{ item.status === 'In' ? 'Trong bãi' : 'Đã ra' }}
                </span>
              </td>
            </tr>
            <tr *ngIf="paginatedRecords.length === 0">
               <td colspan="5" class="py-10 text-center text-gray-400 font-medium">Không tìm thấy dữ liệu phù hợp</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="flex justify-between items-center mt-4 px-1 text-sm">
        <span class="text-gray-500 font-medium">Hiển thị trang <span class="text-gray-900 font-bold">{{ currentPage }}</span> / {{ totalPages }}</span>
        <div class="flex gap-2">
          <button 
            class="px-4 py-2 border border-gray-200 rounded-lg text-gray-600 font-medium hover:bg-gray-50 hover:text-[#0040a1] transition-colors disabled:opacity-40 disabled:hover:bg-transparent disabled:hover:text-gray-600" 
            [disabled]="currentPage === 1" 
            (click)="prevPage()">
            Trang trước
          </button>
          <button 
            class="px-4 py-2 border border-gray-200 rounded-lg text-gray-600 font-medium hover:bg-gray-50 hover:text-[#0040a1] transition-colors disabled:opacity-40 disabled:hover:bg-transparent disabled:hover:text-gray-600" 
            [disabled]="currentPage === totalPages" 
            (click)="nextPage()">
            Trang sau
          </button>
        </div>
      </div>
      
    </div>
    ```
