<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="ion-text-center">VisionPark</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <ion-card>
      <ion-card-header>
        <ion-card-title class="ion-text-center">Đăng Nhập</ion-card-title>
        <ion-card-subtitle class="ion-text-center">Hệ thống quản lý bãi giữ xe</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-item lines="full">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-input 
            type="text" 
            placeholder="Tên đăng nhập" 
            [(ngModel)]="loginData.username">
          </ion-input>
        </ion-item>

        <ion-item lines="full">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input 
            type="password" 
            placeholder="Mật khẩu" 
            [(ngModel)]="loginData.password">
          </ion-input>
        </ion-item>

        <div class="ion-margin-top">
          <ion-button expand="block" (click)="handleLogin()">Đăng Nhập</ion-button>
        </div>

      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
