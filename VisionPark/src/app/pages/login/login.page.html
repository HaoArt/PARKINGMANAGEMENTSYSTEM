<ion-content class="relative">
  <!-- Background Decorations (Premium Dark Blue + Teal Glassmorphism) -->
  <div
    class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none z-0 bg-[#0a1128]"
  >
    <div
      class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-[#003399] blur-[120px] opacity-40"
    ></div>
    <div
      class="absolute bottom-[0%] -right-[10%] w-[50%] h-[50%] rounded-full bg-[#0d9488] blur-[120px] opacity-30"
    ></div>
    <div
      class="absolute top-[40%] left-[30%] w-[30%] h-[30%] rounded-full bg-[#2563eb] blur-[100px] opacity-20"
    ></div>
  </div>

  <div
    class="relative z-10 flex flex-col items-center justify-center min-h-screen p-4 sm:p-6 lg:p-8"
  >
    <div
      class="w-full max-w-[420px] bg-[#1e293b]/60 backdrop-blur-xl border border-white/10 rounded-[24px] p-8 sm:p-10 shadow-[0_8px_32px_rgba(0,0,0,0.4)] transition-all duration-300"
    >
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-16 h-16 rounded-[18px] bg-gradient-to-br from-[#003399] to-[#0d9488] mb-5 shadow-lg shadow-teal-900/20"
        >
          <ion-icon name="car-sport" class="text-3xl text-white"></ion-icon>
        </div>
        <h1
          class="text-2xl sm:text-3xl font-black text-white tracking-tight mb-2"
        >
          VISIONPARK
        </h1>
        <p class="text-[13px] sm:text-[14px] font-medium text-gray-400">
          Hệ thống quản lý bãi xe thông minh
        </p>
      </div>

      <div class="space-y-5">
        <div class="form-group">
          <label
            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2"
            >Tên đăng nhập</label
          >
          <div
            class="relative flex items-center bg-[#0f172a]/50 border border-white/5 rounded-xl overflow-hidden focus-within:border-[#0d9488] focus-within:bg-[#0f172a]/80 focus-within:shadow-[0_0_15px_rgba(13,148,136,0.15)] transition-all duration-300"
          >
            <ion-icon
              name="person-outline"
              class="absolute left-4 text-gray-500 text-lg"
            ></ion-icon>
            <input
              type="text"
              placeholder="Nhập tài khoản của bạn"
              [(ngModel)]="loginData.username"
              (keyup.enter)="handleLogin()"
              class="w-full bg-transparent border-none py-3.5 pl-12 pr-4 text-[14px] text-white placeholder-gray-600 font-medium outline-none"
            />
          </div>
        </div>

        <div class="form-group">
          <div
            class="relative flex items-center bg-[#0f172a]/50 border border-white/5 rounded-xl overflow-hidden focus-within:border-[#0d9488] focus-within:bg-[#0f172a]/80 focus-within:shadow-[0_0_15px_rgba(13,148,136,0.15)] transition-all duration-300"
          >
            <ion-icon
              name="lock-closed-outline"
              class="absolute left-4 text-gray-500 text-lg"
            ></ion-icon>
            <input
              type="password"
              placeholder="Nhập mật khẩu"
              [(ngModel)]="loginData.password"
              (keyup.enter)="handleLogin()"
              class="w-full bg-transparent border-none py-3.5 pl-12 pr-12 text-[14px] text-white placeholder-gray-600 font-medium outline-none"
            />
            <button
              class="absolute right-3 text-gray-500 hover:text-[#2dd4bf] transition-colors bg-transparent border-none flex items-center p-2 cursor-pointer outline-none"
            >
              <ion-icon name="eye-outline" class="text-[18px]"></ion-icon>
            </button>
          </div>
          <div class="flex justify-between items-center mb-2">
            <label
              class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider"
              >Mật khẩu</label
            >
            <a
              href="#"
              class="text-[11px] font-bold text-[#2dd4bf] hover:text-[#5eead4] transition-colors cursor-pointer no-underline"
              >Quên mật khẩu?</a
            >
          </div>
        </div>

        <button
          class="w-full bg-gradient-to-r from-[#003399] to-[#0d9488] hover:from-[#002277] hover:to-[#0f766e] text-white font-bold text-[14px] py-4 rounded-xl shadow-[0_4px_14px_rgba(13,148,136,0.25)] transition-all transform hover:-translate-y-[2px] active:translate-y-0 flex items-center justify-center gap-2 mt-2 outline-none border-none cursor-pointer"
          (click)="handleLogin()"
        >
          Đăng nhập
          <svg
            class="ml-1"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>

      <div class="mt-8 text-center text-[13px] text-gray-400 font-medium">
        Bạn chưa có tài khoản?
        <a
          href="#"
          class="text-[#2dd4bf] font-bold hover:text-[#5eead4] transition-colors no-underline"
          >Liên hệ quản trị viên</a
        >
      </div>
    </div>

    <div
      class="absolute bottom-6 w-full text-center px-4 flex flex-col items-center"
    >
      <span
        class="text-[10px] sm:text-[11px] font-bold text-gray-500 mb-3 tracking-wider uppercase"
        >© 2026 VISIONPARK. HỆ THỐNG QUẢN LÝ BÃI XE THÔNG MINH.</span
      >
      <div class="flex items-center justify-center gap-6">
        <a
          href="#"
          class="text-[11px] font-bold text-gray-500 hover:text-white transition-colors no-underline"
          >ĐIỀU KHOẢN</a
        >
        <a
          href="#"
          class="text-[11px] font-bold text-gray-500 hover:text-white transition-colors no-underline"
          >BẢO MẬT</a
        >
        <a
          href="#"
          class="text-[11px] font-bold text-gray-500 hover:text-white transition-colors no-underline"
          >LIÊN HỆ</a
        >
      </div>
    </div>
  </div>
</ion-content>
