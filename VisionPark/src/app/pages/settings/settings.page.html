<ion-content [fullscreen]="true" class="premium-dashboard">
  <app-navbar></app-navbar>

  <div class="main-wrapper">
    <header class="page-header">
      <div class="header-content">
        <h1>Cài đặt Hệ thống</h1>
        <p>Cấu hình thông số hoạt động và bảng giá dịch vụ bãi đỗ xe.</p>
      </div>
    </header>

    <div class="top-actions-bar">
      <ion-segment
        [value]="CurrentTab"
        (ionChange)="segmentChanged($event)"
        class="premium-segment"
      >
        <ion-segment-button value="general">
          <ion-label class="flex items-center gap-2">
            <ion-icon name="settings-outline"></ion-icon>
            Cài đặt chung
          </ion-label>
        </ion-segment-button>
        <ion-segment-button value="pricing">
          <ion-label class="flex items-center gap-2">
            <ion-icon name="cash-outline"></ion-icon>
            Cấu hình Giá vé
          </ion-label>
        </ion-segment-button>
      </ion-segment>

      <button
        class="btn-primary"
        (click)="saveSettings()"
        [disabled]="isSaving || isLoading"
      >
        <ion-icon
          [name]="isSaving ? 'refresh-outline' : 'save-outline'"
          [class.spin-anim]="isSaving"
        ></ion-icon>
        <span>{{ isSaving ? 'Đang lưu hệ thống...' : 'Lưu thay đổi' }}</span>
      </button>
    </div>

    <div *ngIf="CurrentTab === 'general'" class="animate-fade-in mt-6">
      <div *ngIf="isLoading" class="glass-card max-w-3xl skeleton-card">
        <div class="skeleton-line w-1/3 mb-6"></div>
        <div class="skeleton-box h-12 mb-4"></div>
        <div class="skeleton-box h-12 mb-4"></div>
        <div class="skeleton-box h-12"></div>
      </div>

      <div class="glass-card max-w-3xl" *ngIf="!isLoading">
        <div class="card-header border-bottom">
          <h3 class="flex items-center gap-2 m-0 text-main">
            <div class="icon-box primary">
              <ion-icon name="business-outline"></ion-icon>
            </div>
            Thông tin cơ sở hạ tầng
          </h3>
        </div>

        <div class="card-body">
          <div class="form-group">
            <label>Tên bãi xe (Hiển thị trên vé/hóa đơn)</label>
            <div class="premium-input">
              <ion-icon name="text-outline" class="input-icon"></ion-icon>
              <input
                type="text"
                placeholder="Nhập tên bãi xe..."
                [(ngModel)]="SystemConfig.ParkingName"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Sức chứa tối đa (Số lượng xe)</label>
            <div class="premium-input">
              <ion-icon name="car-sport-outline" class="input-icon"></ion-icon>
              <input
                type="number"
                min="0"
                placeholder="VD: 1000"
                [(ngModel)]="SystemConfig.MaxCapacity"
              />
            </div>
          </div>

          <div class="grid-2-col gap-4">
            <div class="form-group">
              <label>Giờ mở cửa</label>
              <div class="premium-input">
                <ion-icon
                  name="time-outline"
                  class="input-icon text-teal"
                ></ion-icon>
                <input type="time" [(ngModel)]="SystemConfig.OpenTime" />
              </div>
            </div>
            <div class="form-group">
              <label>Giờ đóng cửa</label>
              <div class="premium-input">
                <ion-icon
                  name="time-outline"
                  class="input-icon text-danger"
                ></ion-icon>
                <input type="time" [(ngModel)]="SystemConfig.CloseTime" />
              </div>
            </div>
          </div>

          <div class="form-group mt-2">
            <label>Hotline hỗ trợ sự cố</label>
            <div class="premium-input">
              <ion-icon name="call-outline" class="input-icon"></ion-icon>
              <input
                type="tel"
                placeholder="Nhập số điện thoại..."
                [(ngModel)]="SystemConfig.Hotline"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="CurrentTab === 'pricing'" class="animate-fade-in mt-6">
      <div *ngIf="isLoading" class="grid-2-col gap-6">
        <div class="glass-card skeleton-card h-64" *ngFor="let i of [1,2]">
          <div class="skeleton-line w-1/2 mb-6"></div>
          <div class="skeleton-box h-12 mb-4"></div>
          <div class="skeleton-box h-12"></div>
        </div>
      </div>

      <div
        *ngIf="PricingRules.length === 0 && !isLoading"
        class="empty-state py-12"
      >
        <div class="icon-circle mb-4">
          <ion-icon name="cash-outline"></ion-icon>
        </div>
        <h4>Chưa có bảng giá</h4>
        <p>
          Hệ thống chưa thiết lập dữ liệu bảng giá cho các loại phương tiện.
        </p>
      </div>

      <div
        class="grid-2-col gap-6"
        *ngIf="!isLoading && PricingRules.length > 0"
      >
        <div class="glass-card" *ngFor="let rule of PricingRules">
          <div class="card-header border-bottom flex-justify">
            <h3 class="flex items-center gap-2 m-0 text-main font-bold">
              <div
                class="icon-box"
                [ngClass]="rule.VehicleType === 'Ô tô' ? 'primary' : 'teal'"
              >
                <ion-icon
                  [name]="rule.VehicleType === 'Ô tô' ? 'car-outline' : 'bicycle-outline'"
                ></ion-icon>
              </div>
              Bảng giá: {{ rule.VehicleType }}
            </h3>
          </div>

          <div class="card-body">
            <div class="form-group">
              <label>Giá vé lượt (VNĐ/lần)</label>
              <div class="premium-input">
                <input
                  type="number"
                  min="0"
                  placeholder="0"
                  [(ngModel)]="rule.PricePerEntry"
                />
                <span class="currency-tag">VNĐ</span>
              </div>
            </div>

            <div class="form-group">
              <label>Đăng ký Tháng (VNĐ/tháng)</label>
              <div class="premium-input">
                <input
                  type="number"
                  min="0"
                  placeholder="0"
                  [(ngModel)]="rule.PricePerMonth"
                />
                <span class="currency-tag">VNĐ</span>
              </div>
            </div>

            <div class="form-group">
              <label>Đăng ký Quý (VNĐ/3 tháng)</label>
              <div class="premium-input">
                <input
                  type="number"
                  min="0"
                  placeholder="0"
                  [(ngModel)]="rule.PricePerQuarter"
                />
                <span class="currency-tag">VNĐ</span>
              </div>
            </div>

            <div class="form-group mb-0">
              <label>Đăng ký Năm (VNĐ/năm)</label>
              <div class="premium-input">
                <input
                  type="number"
                  min="0"
                  placeholder="0"
                  [(ngModel)]="rule.PricePerYear"
                />
                <span class="currency-tag">VNĐ</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
