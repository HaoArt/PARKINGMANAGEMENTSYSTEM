<ion-content class="app-bg" style="--background: #f4f6f8;">
  <app-navbar></app-navbar>

  <div class="px-6 md:px-10 py-8 max-w-[1400px] mx-auto">
    
    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8 gap-4">
      
      <ion-segment [value]="CurrentTab" (ionChange)="segmentChanged($event)" class="bg-white rounded-xl shadow-sm p-1.5 border border-gray-200 max-w-[500px] m-0">
        <ion-segment-button value="general" class="rounded-lg">
          <ion-label class="font-bold tracking-wide flex items-center justify-center py-1.5 text-[13px]">
            <ion-icon name="settings-outline" class="mr-2 text-[18px]"></ion-icon> Cài đặt chung
          </ion-label>
        </ion-segment-button>
        <ion-segment-button value="pricing" class="rounded-lg">
          <ion-label class="font-bold tracking-wide flex items-center justify-center py-1.5 text-[13px]">
            <ion-icon name="cash-outline" class="mr-2 text-[18px]"></ion-icon> Cấu hình Giá vé
          </ion-label>
        </ion-segment-button>
      </ion-segment>

      <button class="bg-[#003399] text-white px-6 py-3 rounded-xl text-[13px] font-bold flex items-center justify-center gap-2 hover:bg-[#002277] transition-all shadow-md" (click)="saveSettings()">
        <ion-icon name="save-outline" class="text-[18px]"></ion-icon> Lưu thay đổi
      </button>

    </div>

    <div *ngIf="CurrentTab === 'general'" class="animate-fade-in">
      <ion-grid class="p-0">
        <ion-row>
          <ion-col size="12" size-md="8" size-lg="6">
            <ion-card class="m-0 border border-gray-200 shadow-sm rounded-2xl">
              <ion-card-header class="bg-white border-b border-gray-100 py-4 px-6">
                <ion-card-title class="text-gray-800 font-extrabold text-[16px] flex items-center">
                  <ion-icon name="business-outline" class="mr-2 text-xl text-[#003399]"></ion-icon> Thông tin bãi đỗ xe
                </ion-card-title>
              </ion-card-header>
              <ion-card-content class="p-6 bg-gray-50 flex flex-col gap-4">
                
                <ion-item lines="none" class="bg-white rounded-xl border border-gray-200 shadow-sm">
                  <ion-input label="Tên bãi xe (Hiển thị trên vé)" label-placement="floating" [(ngModel)]="SystemConfig.ParkingName"></ion-input>
                </ion-item>

                <ion-item lines="none" class="bg-white rounded-xl border border-gray-200 shadow-sm">
                  <ion-input type="number" label="Sức chứa tối đa (xe)" label-placement="floating" [(ngModel)]="SystemConfig.MaxCapacity"></ion-input>
                </ion-item>

                <div class="flex gap-4">
                  <ion-item lines="none" class="flex-1 bg-white rounded-xl border border-gray-200 shadow-sm">
                    <ion-input type="time" label="Giờ mở cửa" label-placement="floating" [(ngModel)]="SystemConfig.OpenTime"></ion-input>
                  </ion-item>
                  <ion-item lines="none" class="flex-1 bg-white rounded-xl border border-gray-200 shadow-sm">
                    <ion-input type="time" label="Giờ đóng cửa" label-placement="floating" [(ngModel)]="SystemConfig.CloseTime"></ion-input>
                  </ion-item>
                </div>

                <ion-item lines="none" class="bg-white rounded-xl border border-gray-200 shadow-sm">
                  <ion-icon name="call-outline" slot="start" class="text-gray-400 mt-2"></ion-icon>
                  <ion-input type="tel" label="Hotline hỗ trợ sự cố" label-placement="floating" [(ngModel)]="SystemConfig.Hotline"></ion-input>
                </ion-item>

              </ion-card-content>
            </ion-card>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>

    <div *ngIf="CurrentTab === 'pricing'" class="animate-fade-in">
      <ion-grid class="p-0">
        <ion-row class="gap-y-6">
          
          <ion-col size="12" size-md="6" *ngFor="let rule of PricingRules">
            <ion-card class="m-0 h-full border border-gray-200 shadow-sm rounded-2xl mx-2">
              <ion-card-header class="bg-white border-b border-gray-100 py-4 px-6 flex justify-between items-center">
                <ion-card-title class="text-gray-800 font-extrabold text-[16px] flex items-center">
                  <ion-icon [name]="rule.VehicleType === 'Ô tô' ? 'car-outline' : 'bicycle-outline'" class="mr-2 text-[22px] text-[#003399]"></ion-icon> 
                  Bảng giá: {{ rule.VehicleType }}
                </ion-card-title>
              </ion-card-header>
              
              <ion-card-content class="p-6 bg-gray-50 flex flex-col gap-4">
                
                <ion-item lines="none" class="bg-white rounded-xl border border-gray-200 shadow-sm">
                  <ion-input type="number" label="Giá vé lượt (VNĐ/lần)" label-placement="floating" [(ngModel)]="rule.PricePerEntry"></ion-input>
                </ion-item>

                <ion-item lines="none" class="bg-white rounded-xl border border-gray-200 shadow-sm">
                  <ion-input type="number" label="Giá đăng ký theo Tháng (VNĐ/tháng)" label-placement="floating" [(ngModel)]="rule.PricePerMonth"></ion-input>
                </ion-item>

                <ion-item lines="none" class="bg-white rounded-xl border border-gray-200 shadow-sm">
                  <ion-input type="number" label="Giá đăng ký theo Quý (VNĐ/3 tháng)" label-placement="floating" [(ngModel)]="rule.PricePerQuarter"></ion-input>
                </ion-item>

                <ion-item lines="none" class="bg-white rounded-xl border border-gray-200 shadow-sm">
                  <ion-input type="number" label="Giá đăng ký theo Năm (VNĐ/năm)" label-placement="floating" [(ngModel)]="rule.PricePerYear"></ion-input>
                </ion-item>

              </ion-card-content>
            </ion-card>
          </ion-col>

        </ion-row>
      </ion-grid>
    </div>

  </div>
</ion-content>
